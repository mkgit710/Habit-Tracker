<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0c0e16">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>MATT OS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior:none}
body{min-height:100vh;min-height:100dvh;background:#0c0e16;color:#e8e6f0;font-family:system-ui,-apple-system,sans-serif}
.wrap{max-width:460px;margin:0 auto;padding:0 12px 40px}
/* Header */
.hdr{background:linear-gradient(180deg,#12141f 0%,#0c0e16 100%);padding:16px 12px 0;position:sticky;top:0;z-index:10;max-width:460px;margin:0 auto}
.hdr-brand{text-align:center;margin-bottom:10px}
.hdr-brand h1{font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:#6b7080;font-weight:700;margin-bottom:2px}
.hdr-brand .date-big{font-size:22px;font-weight:800;letter-spacing:-.5px}
.hdr-brand .date-sub{font-size:12px;color:#6b7080;font-family:monospace}
/* Date Nav */
.date-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.date-nav button{background:none;border:none;color:#6b7080;font-size:12px;cursor:pointer;padding:6px 10px;display:flex;align-items:center;gap:4px}
.date-nav button:active{color:#f0a04b}
.date-nav .arr{font-size:18px}
/* Week strip */
.week{display:flex;justify-content:center;gap:4px;margin-bottom:10px}
.wday{width:32px;height:32px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:all .15s;position:relative}
.wday .wnum{font-size:12px;font-weight:800;font-family:monospace}
.wday .wlbl{font-size:8px;color:#6b7080;margin-top:-1px}
/* Mode toggle */
.modes{display:flex;gap:6px;margin-bottom:10px}
.mode-btn{flex:1;padding:10px 8px;border-radius:12px;border:1.5px solid #1e2035;background:rgba(255,255,255,.02);color:#6b7080;font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s}
.mode-btn.fit-on{background:rgba(240,160,75,.1);border-color:rgba(240,160,75,.4);color:#f0a04b}
.mode-btn.great-on{background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.4);color:#a78bfa}
/* Score bar */
.score-area{margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #1a1d2e}
.score-row{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.score-pct{font-family:monospace;font-size:28px;font-weight:800;min-width:60px}
.score-bars{flex:1}
.sbar{margin-bottom:4px;display:flex;align-items:center;gap:8px}
.sbar-label{font-size:10px;color:#6b7080;width:50px;text-align:right;font-weight:600}
.sbar-track{flex:1;height:6px;background:#1e2035;border-radius:99px;overflow:hidden}
.sbar-fill{height:100%;border-radius:99px;transition:width .4s ease}
/* Cards */
.card{background:rgba(255,255,255,.025);border:1px solid #1e2035;border-radius:14px;padding:14px;margin-bottom:10px}
.card-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:99px;display:inline-block;margin-bottom:10px}
/* Rows */
.row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.row:last-child{border-bottom:none}
.row.wide{flex-direction:column;align-items:flex-start;gap:6px}
.rl{font-size:13px;color:#c4c2d0;display:flex;align-items:center;gap:7px}
.rl .em{font-size:15px}
.sub{font-size:10px;color:#6b7080}
/* Inputs */
.chk{width:32px;height:32px;border-radius:9px;border:2px solid #2e3154;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.chk.on{border-color:#f0a04b;background:#f0a04b}
.cbtn{width:28px;height:28px;border-radius:7px;border:1px solid #2e3154;background:rgba(255,255,255,.03);color:#e8e6f0;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cval{font-family:monospace;font-size:18px;font-weight:700;min-width:22px;text-align:center}
.ti{background:rgba(255,255,255,.05);border:1.5px solid #2e3154;border-radius:10px;padding:7px 10px;color:#e8e6f0;font-family:monospace;font-size:14px;font-weight:600;width:90px}
.ti:focus{outline:0;border-color:#f0a04b}
.txt{background:rgba(255,255,255,.04);border:1.5px solid #1e2035;border-radius:10px;padding:10px 12px;color:#e8e6f0;font-size:13px;width:100%;font-family:inherit;resize:none;min-height:40px}
.txt:focus{outline:0;border-color:#a78bfa}
.txt::placeholder{color:#3d4060}
.pill{padding:5px 11px;border-radius:99px;border:1.5px solid #2e3154;background:transparent;color:#8b8fa8;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s}
.pill.on{background:rgba(240,160,75,.15);border-color:#f0a04b;color:#f0a04b}
.mc{padding:4px 9px;border-radius:8px;border:1.5px solid #2e3154;background:transparent;color:#8b8fa8;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s}
.mc.on{background:rgba(74,222,128,.12);border-color:#4ade80;color:#4ade80}
.mood-btn{font-size:22px;cursor:pointer;opacity:.3;transition:all .15s;background:none;border:none;padding:4px}
.mood-btn.on{opacity:1;transform:scale(1.2)}
/* Schedule blocks */
.sched-card{background:rgba(255,255,255,.02);border:1px solid #1e2035;border-radius:12px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.sched-card.done-card{opacity:.45}
.sched-time{font-family:monospace;font-size:10px;color:#6b7080;min-width:75px;line-height:1.3}
.sched-body{flex:1;min-width:0}
.sched-body .sl{font-size:13px;font-weight:500;color:#c4c2d0}
.sched-body .sn{font-size:10px;color:#505370;margin-top:1px}
.sched-cat-dot{width:4px;height:28px;border-radius:99px;flex-shrink:0}
.sched-chk{width:26px;height:26px;border-radius:7px;border:2px solid #2e3154;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.sched-chk.on{border-color:#a78bfa;background:#a78bfa}
.sched-chk.skip{opacity:.2;cursor:default}
/* MIT */
.mit-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.mit-row .chk{width:26px;height:26px;border-radius:7px}
.mit-row input{flex:1;background:none;border:none;border-bottom:1px solid #1e2035;color:#e8e6f0;font-size:13px;padding:6px 0;font-family:inherit}
.mit-row input:focus{outline:0;border-color:#a78bfa}
.mit-row input.done-text{text-decoration:line-through;color:#6b7080}
/* Streaks */
.streak-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0}
.streak-row .s-name{font-size:12px;color:#c4c2d0}
.streak-row .s-val{font-size:12px;font-family:monospace;font-weight:700;color:#f0a04b}
/* Misc */
.na{background:none;border:none;color:#6b7080;font-size:20px;cursor:pointer;padding:4px 8px}
.glow{animation:gl 2s ease-in-out infinite;display:inline-block}
@keyframes gl{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.section-gap{height:8px}
.foot{text-align:center;font-size:10px;color:#3d4060;margin-top:12px}
.future-matt{background:linear-gradient(135deg,rgba(167,139,250,.08),rgba(240,160,75,.06));border:1px solid rgba(167,139,250,.2);border-radius:14px;padding:14px;margin-bottom:10px}
.future-matt .fm-q{font-size:11px;color:#a78bfa;font-weight:600;margin-bottom:6px}
.gear{background:none;border:1px solid #1e2035;color:#6b7080;font-size:14px;cursor:pointer;padding:3px 8px;border-radius:8px}
/* Settings */
.s-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.s-row:last-child{border-bottom:none}
.sb{padding:4px 8px;border-radius:6px;border:1px solid #2e3154;background:none;color:#8b8fa8;font-size:11px;cursor:pointer}
.sb.pri{background:rgba(240,160,75,.12);border-color:#f0a04b;color:#f0a04b}
.inp{background:rgba(255,255,255,.05);border:1.5px solid #2e3154;border-radius:10px;padding:8px 12px;color:#e8e6f0;font-size:14px;width:100%;font-family:inherit}
.inp:focus{outline:0;border-color:#f0a04b}
.inp-sm{width:70px;text-align:center}
.sel{background:rgba(255,255,255,.05);border:1.5px solid #2e3154;border-radius:10px;padding:8px 12px;color:#e8e6f0;font-size:13px;font-family:inherit;width:100%}
.sel:focus{outline:0;border-color:#f0a04b}
.sel option{background:#161929;color:#e8e6f0}
.back-btn{background:none;border:none;color:#8b8fa8;font-size:14px;cursor:pointer}
.type-btn{padding:5px 10px;border-radius:8px;border:1.5px solid #2e3154;background:none;color:#8b8fa8;font-size:11px;cursor:pointer}
.type-btn.on{border-color:#f0a04b;background:rgba(240,160,75,.12);color:#f0a04b}
</style>
</head>
<body>
<div class="hdr" id="hdr"></div>
<div class="wrap" id="app"></div>
<script>
// ═══════════════ CONFIG ═══════════════
var SCHED_CATS={deep_work:{l:"Deep Work",c:"#3b82f6",bg:"rgba(59,130,246,.15)"},learning:{l:"Learning",c:"#4ade80",bg:"rgba(74,222,128,.1)"},training:{l:"Training",c:"#60a5fa",bg:"rgba(96,165,250,.12)"},brk:{l:"Break",c:"#f0a04b",bg:"rgba(240,160,75,.1)"},meal:{l:"Meal",c:"#fbbf24",bg:"rgba(251,191,36,.1)"},sleep:{l:"Sleep",c:"#64748b",bg:"rgba(100,116,139,.12)"},meeting:{l:"Meeting",c:"#a78bfa",bg:"rgba(167,139,250,.12)"},personal:{l:"Personal",c:"#f472b6",bg:"rgba(244,114,182,.1)"},planning:{l:"Planning",c:"#14b8a6",bg:"rgba(20,184,166,.1)"},work:{l:"Work",c:"#3b82f6",bg:"rgba(59,130,246,.12)"}};
var DEFAULT_SCHED=[
{id:"s1",start:"10:00",end:"10:40",label:"Deep Work Block 1",notes:"Most important tasks",cat:"deep_work"},
{id:"s2",start:"10:40",end:"11:00",label:"TPM Training",notes:"OTU module",cat:"training"},
{id:"s3",start:"11:00",end:"11:15",label:"Break",notes:"Walk / talk to friends",cat:"brk"},
{id:"s4",start:"11:15",end:"12:15",label:"AI Agents Learn/Build",cat:"learning"},
{id:"s5",start:"12:15",end:"12:30",label:"Break",cat:"brk"},
{id:"s6",start:"12:30",end:"13:30",label:"AI Agents Learn/Build",cat:"learning"},
{id:"s7",start:"13:30",end:"14:30",label:"Lunch",cat:"meal"},
{id:"s8",start:"14:30",end:"15:30",label:"AI Agents Learn/Build",cat:"learning"},
{id:"s9",start:"15:30",end:"16:15",label:"Power Nap",cat:"sleep"},
{id:"s10",start:"16:15",end:"17:00",label:"Learn from Devs",cat:"learning"},
{id:"s11",start:"17:00",end:"17:30",label:"Break",cat:"brk"},
{id:"s12",start:"17:30",end:"18:30",label:"Work",cat:"work"},
{id:"s13",start:"18:30",end:"22:00",label:"Meetings / Learn",notes:"Use breaks to learn",cat:"meeting"},
{id:"s14",start:"22:00",end:"22:30",label:"Plan Tomorrow",cat:"planning"},
{id:"s15",start:"22:30",end:"22:45",label:"Call Liah",cat:"personal"},
{id:"s16",start:"23:00",end:"06:30",label:"Sleep",notes:"7.5 hrs target",cat:"sleep"}
];

// ═══════════════ STATE ═══════════════
var K={fit:"mattos_fit_v1",great:"mattos_great_v1",sched:"mattos_sched_v1",prefs:"mattos_prefs_v1"};
var S={date:fmtD(new Date()),mode:"fit",view:"main",fitData:{},greatData:{},schedule:DEFAULT_SCHED.slice(),prefs:{book_name:""},editIdx:-1,newBlock:{label:"",start:"",end:"",notes:"",cat:"deep_work"}};
try{var _a=localStorage.getItem(K.fit);if(_a)S.fitData=JSON.parse(_a)}catch(e){}
try{var _b=localStorage.getItem(K.great);if(_b)S.greatData=JSON.parse(_b)}catch(e){}
try{var _c=localStorage.getItem(K.sched);if(_c)S.schedule=JSON.parse(_c)}catch(e){}
try{var _d=localStorage.getItem(K.prefs);if(_d)S.prefs=JSON.parse(_d)}catch(e){}

function fmtD(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function today(){return fmtD(new Date())}
function uid(){return Math.random().toString(36).slice(2,8)}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function nav(off){var d=new Date(S.date+"T12:00:00");d.setDate(d.getDate()+off);S.date=fmtD(d);render()}

// ═══════ FIT DATA ═══════
function F(field){var d=S.fitData[S.date];return d?d[field]:undefined}
function setF(field,val){if(!S.fitData[S.date])S.fitData[S.date]={};S.fitData[S.date][field]=val;sv(K.fit,S.fitData);render()}
function toggleF(field){setF(field,!F(field))}
function incF(field,max){setF(field,Math.min((F(field)||0)+1,max))}
function decF(field){setF(field,Math.max((F(field)||0)-1,0))}
function toggleFsub(field,key){var obj=F(field)||{};var n={};for(var k in obj)n[k]=obj[k];n[key]=!n[key];setF(field,n)}

// ═══════ GREAT DATA ═══════
function G(field){var d=S.greatData[S.date];return d?d[field]:undefined}
function setG(field,val){if(!S.greatData[S.date])S.greatData[S.date]={};S.greatData[S.date][field]=val;sv(K.great,S.greatData);render()}
function setGnoRender(field,val){if(!S.greatData[S.date])S.greatData[S.date]={};S.greatData[S.date][field]=val;sv(K.great,S.greatData)}

// ═══════ SCORES ═══════
function fitScore(date){
  var d=S.fitData[date];if(!d)return 0;var pts=0,mx=0;
  mx++;if(d.wake_time)pts++;
  mx++;if(d.workout)pts++;
  mx++;if(d.stretch)pts++;
  mx++;pts+=Math.min((d.eggs||0)/4,1);
  mx++;if(d.chicken)pts++;
  mx++;if(d.protein_src)pts++;
  mx++;var fc=0;if(d.fruits){var fk=Object.keys(d.fruits);for(var i=0;i<fk.length;i++)if(d.fruits[fk[i]])fc++}pts+=Math.min(fc/2,1);
  mx++;var vc=0;if(d.veggies){var vk=Object.keys(d.veggies);for(var i=0;i<vk.length;i++)if(d.veggies[vk[i]])vc++}pts+=Math.min(vc/2,1);
  mx++;if(d.seeds)pts++;
  mx++;if(d.dates_eaten)pts++;
  mx++;pts+=Math.min((d.water||0)/3,1);
  mx++;if(d.steps)pts++;
  mx++;if(d.evening_walk)pts++;
  mx++;if(d.sleep_hrs&&parseFloat(d.sleep_hrs)>=7)pts++;
  return mx>0?Math.round(pts/mx*100):0;
}
function greatScore(date){
  var d=S.greatData[date];if(!d)return 0;var pts=0,mx=0;
  mx++;if(d.mission)pts++;
  mx++;if(d.future_matt)pts++;
  // MITs
  var mits=d.mits||[];for(var i=0;i<3;i++){mx++;if(mits[i]&&mits[i].done)pts++}
  // Schedule
  var sd=d.schedule_done||{};for(var i=0;i<S.schedule.length;i++){var b=S.schedule[i];if(b.cat==="brk"||b.cat==="meal"||b.cat==="sleep")continue;mx++;if(sd[b.id])pts++}
  // AI
  mx++;var ac=0;if(d.ai){var ak=Object.keys(d.ai);for(var i=0;i<ak.length;i++)if(d.ai[ak[i]])ac++}if(ac>=2)pts++;
  // PM
  mx++;var pc=0;if(d.pm){var pk=Object.keys(d.pm);for(var i=0;i<pk.length;i++)if(d.pm[pk[i]])pc++}if(pc>=2)pts++;
  // Reading
  mx++;if((d.pages||0)>=10||d.chapter_done)pts++;
  // Reflection
  mx++;if(d.learned)pts++;
  mx++;if(d.tomorrow)pts++;
  return mx>0?Math.round(pts/mx*100):0;
}
function totalScore(date){var f=fitScore(date),g=greatScore(date);return Math.round((f+g)/2)}

function getStreak(checkFn){var s=0,t=new Date();for(var i=0;i<90;i++){var d=new Date(t);d.setDate(t.getDate()-i);if(checkFn(fmtD(d)))s++;else break}return s}
function getWeekDates(ds){var d=new Date(ds+"T12:00:00"),day=d.getDay(),mon=new Date(d);mon.setDate(d.getDate()-((day+6)%7));var a=[];for(var i=0;i<7;i++){var dt=new Date(mon);dt.setDate(mon.getDate()+i);a.push(fmtD(dt))}return a}

var ck='<svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M2 7l4 4 6-7" stroke="#0c0e16" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
var DL=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

// ═══════════════ RENDER ═══════════════
function render(){
  renderHeader();
  var app=document.getElementById("app");
  if(S.view==="main"){
    app.innerHTML=S.mode==="fit"?renderFit():renderGreat();
  }else if(S.view==="schedSettings"){
    app.innerHTML=renderSchedSettings();
  }else if(S.view==="addBlock"||S.view==="editBlock"){
    app.innerHTML=renderBlockForm();
  }
  bind();
}

function renderHeader(){
  var d=new Date(S.date+"T12:00:00");
  var isToday=S.date===today();
  var dayName=d.toLocaleDateString("en-IN",{weekday:"long"});
  var dateStr=d.toLocaleDateString("en-IN",{day:"numeric",month:"long"});
  var week=getWeekDates(S.date);
  var fs=fitScore(S.date),gs=greatScore(S.date),ts=totalScore(S.date);
  var tsCol=ts>=80?"#4ade80":ts>=50?"#f0a04b":"#ef4444";
  var h='<div style="max-width:460px;margin:0 auto;padding:0 12px">';
  // Brand
  h+='<div class="hdr-brand"><h1>MATT OS</h1>';
  h+='<div class="date-big">'+(isToday?dayName:esc(dayName))+'</div>';
  h+='<div class="date-sub">'+esc(dateStr)+(isToday?" \u2022 Today":"")+'</div></div>';
  // Date nav
  h+='<div class="date-nav"><button data-act="nav" data-dir="-1"><span class="arr">\u25C0</span> Yesterday</button>';
  h+='<button data-act="today" style="font-size:11px;color:#f0a04b;font-weight:700">'+(isToday?"":"Jump to Today")+'</button>';
  h+='<button data-act="nav" data-dir="1">Tomorrow <span class="arr">\u25B6</span></button></div>';
  // Week strip
  h+='<div class="week">';
  for(var i=0;i<week.length;i++){
    var wd=week[i],isSel=wd===S.date,sc=totalScore(wd),isFut=new Date(wd+"T23:59:59")>new Date();
    var dd=new Date(wd+"T12:00:00").getDate();
    var bg=isFut?"transparent":sc>=80?"rgba(74,222,128,.2)":sc>=50?"rgba(240,160,75,.18)":S.fitData[wd]||S.greatData[wd]?"rgba(239,68,68,.12)":"rgba(255,255,255,.03)";
    var bc=isSel?(S.mode==="fit"?"#f0a04b":"#a78bfa"):"transparent";
    var col=isFut?"#2e3154":isSel?(S.mode==="fit"?"#f0a04b":"#a78bfa"):"#8b8fa8";
    h+='<div class="wday" data-act="selday" data-d="'+wd+'" style="background:'+bg+';border-color:'+bc+';color:'+col+'"><span class="wnum">'+dd+'</span></div>';
  }
  h+='</div>';
  // Mode toggle
  h+='<div class="modes"><button class="mode-btn'+(S.mode==="fit"?" fit-on":"")+'" data-act="mode" data-m="fit">\uD83D\uDCAA Becoming Fit</button>';
  h+='<button class="mode-btn'+(S.mode==="great"?" great-on":"")+'" data-act="mode" data-m="great">\uD83D\uDE80 Becoming Great</button></div>';
  // Score
  h+='<div class="score-area"><div class="score-row"><div class="score-pct" style="color:'+tsCol+'">'+ts+'%</div><div class="score-bars">';
  h+='<div class="sbar"><span class="sbar-label">Health</span><div class="sbar-track"><div class="sbar-fill" style="width:'+fs+'%;background:#f0a04b"></div></div></div>';
  h+='<div class="sbar"><span class="sbar-label">Growth</span><div class="sbar-track"><div class="sbar-fill" style="width:'+gs+'%;background:#a78bfa"></div></div></div>';
  h+='</div></div></div>';
  h+='</div>';
  document.getElementById("hdr").innerHTML=h;
}

// ═══════════════ FIT MODE ═══════════════
function renderFit(){
  var h='';
  // Morning
  h+='<div class="card"><div class="card-title" style="background:rgba(251,191,36,.1);color:#fbbf24">\u2600\uFE0F Morning</div>';
  h+=fitRow("\u23F0","Woke up at","time","wake_time");
  h+=fitCheck("\uD83C\uDFCB\uFE0F","Workout","workout","#f0a04b");
  h+=fitCheck("\uD83E\uDDD8","Stretch","stretch","#4ade80");
  h+='</div>';
  // Protein

function fitCheck(emoji,label,field,color){
  var on=!!F(field);
  return'<div class="row"><div class="rl"><span class="em">'+emoji+'</span> '+esc(label)+'</div><div class="chk'+(on?" on":"")+'" data-act="togf" data-f="'+field+'" style="'+(on?"background:"+color+";border-color:"+color:"")+'">'+(on?ck:"")+'</div></div>';

function fitCounter(emoji,label,field,target,max){
  var val=F(field)||0,met=val>=target,vc=met?"#4ade80":val>0?"#f0a04b":"#e8e6f0";
  return'<div class="row"><div class="rl"><span class="em">'+emoji+'</span> '+esc(label)+' <span class="sub">(target: '+target+')</span></div><div style="display:flex;align-items:center;gap:7px"><button class="cbtn" data-act="decf" data-f="'+field+'">-</button><span class="cval" style="color:'+vc+'">'+val+'</span><button class="cbtn" data-act="incf" data-f="'+field+'" data-max="'+max+'">+</button></div></div>';

function fitRow(emoji,label,type,field){
  if(type==="time")return'<div class="row"><div class="rl"><span class="em">'+emoji+'</span> '+esc(label)+'</div><input type="time" class="ti" value="'+(F(field)||"")+'" data-act="timef" data-f="'+field+'"></div>';
  return'';
}
function fitChips(field,items,color){
  var sel=F(field)||{};
  var h='<div style="display:flex;gap:6px;flex-wrap:wrap;padding:4px 0">';
  for(var i=0;i<items.length;i++){var k=items[i][0],l=items[i][1],on=!!sel[k];

  return h+'</div>';
}

// ═══════════════ EVENTS ═══════════════
function bind(){
  var els=document.querySelectorAll("[data-act]");
  for(var i=0;i<els.length;i++){(function(el){
    var a=el.getAttribute("data-act");
    if(a==="nav"){el.onclick=function(){nav(parseInt(el.getAttribute("data-dir")))}}
    else if(a==="today"){el.onclick=function(){S.date=today();render()}}
    else if(a==="selday"){el.onclick=function(){S.date=el.getAttribute("data-d");render()}}
    else if(a==="mode"){el.onclick=function(){S.mode=el.getAttribute("data-m");S.view="main";render()}}
    // Fit
    else if(a==="togf"){el.onclick=function(){toggleF(el.getAttribute("data-f"))}}
    else if(a==="incf"){el.onclick=function(){incF(el.getAttribute("data-f"),parseInt(el.getAttribute("data-max")))}}
    else if(a==="decf"){el.onclick=function(){decF(el.getAttribute("data-f"))}}
    else if(a==="timef"){el.onchange=function(){setF(el.getAttribute("data-f"),el.value)}}
    else if(a==="numf"){el.onchange=function(){setF(el.getAttribute("data-f"),el.value)}}
    else if(a==="setf"){el.onclick=function(){var f=el.getAttribute("data-f"),v=el.getAttribute("data-v");setF(f,F(f)===v?"":v)}}
    else if(a==="togfsub"){el.onclick=function(){toggleFsub(el.getAttribute("data-f"),el.getAttribute("data-k"))}}
    // Great
    else if(a==="txtg"){el.onblur=function(){setGnoRender(el.getAttribute("data-f"),el.value)};el.onchange=function(){setGnoRender(el.getAttribute("data-f"),el.value)}}
    else if(a==="togmit"){el.onclick=function(){var idx=parseInt(el.getAttribute("data-i"));var mits=G("mits")||[{t:"",d:false},{t:"",d:false},{t:"",d:false}];while(mits.length<3)mits.push({t:"",d:false});mits[idx].d=!mits[idx].d;setG("mits",mits)}}
    else if(a==="txtmit"){el.onblur=function(){var idx=parseInt(el.getAttribute("data-i"));var mits=G("mits")||[{t:"",d:false},{t:"",d:false},{t:"",d:false}];while(mits.length<3)mits.push({t:"",d:false});mits[idx].t=el.value;setGnoRender("mits",mits)}}
    else if(a==="togsched"){el.onclick=function(){var bid=el.getAttribute("data-bid");var sd=G("schedule_done")||{};var ns={};for(var k in sd)ns[k]=sd[k];ns[bid]=!ns[bid];setG("schedule_done",ns)}}
    else if(a==="toggsub"){el.onclick=function(){var f=el.getAttribute("data-f"),k=el.getAttribute("data-k");var obj=G(f)||{};var ns={};for(var x in obj)ns[x]=obj[x];ns[k]=!ns[k];setG(f,ns)}}
    else if(a==="togchapter"){el.onclick=function(){setG("chapter_done",!G("chapter_done"))}}
    else if(a==="incg"){el.onclick=function(){setG("pages",Math.min((G("pages")||0)+1,200))}}
    else if(a==="decg"){el.onclick=function(){setG("pages",Math.max((G("pages")||0)-1,0))}}
    else if(a==="txtgrat"){el.onblur=function(){var idx=parseInt(el.getAttribute("data-i"));var g=G("gratitude")||["","",""];while(g.length<3)g.push("");g[idx]=el.value;setGnoRender("gratitude",g)}}
    else if(a==="bookname"){el.onblur=function(){S.prefs.book_name=el.value;sv(K.prefs,S.prefs)}}
    // Schedule settings
    else if(a==="schedsettings"){el.onclick=function(){S.view="schedSettings";render()}}
    else if(a==="backMain"){el.onclick=function(){S.view="main";render()}}
    else if(a==="backSched"){el.onclick=function(){S.view="schedSettings";render()}}
    else if(a==="moveblk"){el.onclick=function(){var idx=parseInt(el.getAttribute("data-idx")),dir=parseInt(el.getAttribute("data-dir")),ni=idx+dir;if(ni<0||ni>=S.schedule.length)return;var tmp=S.schedule[idx];S.schedule[idx]=S.schedule[ni];S.schedule[ni]=tmp;sv(K.sched,S.schedule);render()}}
    else if(a==="editblk"){el.onclick=function(){S.editIdx=parseInt(el.getAttribute("data-idx"));S.view="editBlock";render()}}
    else if(a==="delblk"){el.onclick=function(){if(confirm('Delete "'+el.getAttribute("data-name")+'"?')){S.schedule.splice(parseInt(el.getAttribute("data-idx")),1);sv(K.sched,S.schedule);render()}}}
    else if(a==="addblk"){el.onclick=function(){S.newBlock={label:"",start:"",end:"",notes:"",cat:"deep_work"};S.view="addBlock";render()}}
    else if(a==="setblkcat"){el.onclick=function(){var b=S.view==="editBlock"?S.schedule[S.editIdx]:S.newBlock;readBlk(b);b.cat=el.getAttribute("data-c");render()}}
    else if(a==="submitblk"){el.onclick=function(){
      if(S.view==="editBlock"){readBlk(S.schedule[S.editIdx]);if(!S.schedule[S.editIdx].label.trim())return}
      else{readBlk(S.newBlock);if(!S.newBlock.label.trim()||!S.newBlock.start||!S.newBlock.end)return;S.schedule.push({id:uid(),label:S.newBlock.label,start:S.newBlock.start,end:S.newBlock.end,notes:S.newBlock.notes,cat:S.newBlock.cat})}
      sv(K.sched,S.schedule);S.view="schedSettings";render()}}
  })(els[i])}
}
function readBlk(b){var n=document.getElementById("bname");if(n)b.label=n.value;var s=document.getElementById("bstart");if(s)b.start=s.value;var e=document.getElementById("bend");if(e)b.end=e.value;var o=document.getElementById("bnotes");if(o)b.notes=o.value}

// ═══════════════ INIT ═══════════════
render();
if("serviceWorker" in navigator){try{navigator.serviceWorker.register("sw.js").catch(function(){})}catch(e){}}
</script>
